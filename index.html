<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Times Tables Challenge!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --yellow: #FFD93D;
    --orange: #FF6B35;
    --green: #06D6A0;
    --blue: #4CC9F0;
    --pink: #FF70A6;
    --purple: #9B5DE5;
    --bg: #1a1a2e;
    --card: #16213e;
    --card2: #0f3460;
    --text: #ffffff;
    --muted: rgba(255,255,255,0.6);
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    overflow-x: hidden;
  }

  .stars {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 50%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 60% 20%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 70%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 85%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 90% 40%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 55%, rgba(255,255,255,0.4) 0%, transparent 100%);
  }

  .wrap { position: relative; z-index: 1; width: 100%; max-width: 480px; }

  .card {
    background: var(--card);
    border-radius: 28px;
    padding: 2.5rem 2rem;
    border: 2px solid rgba(255,255,255,0.08);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .screen { display: none; }
  .screen.active { display: block; }

  /* ── START SCREEN ── */
  .big-title {
    font-family: 'Fredoka One', cursive;
    font-size: 2.8rem;
    line-height: 1.1;
    text-align: center;
    background: linear-gradient(135deg, var(--yellow), var(--orange), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.4rem;
  }

  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 1rem;
    margin-bottom: 1.5rem;
  }

  .section-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-align: center;
    margin-bottom: 0.6rem;
  }

  .diff-btns {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 1.5rem;
  }

  .diff-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.05rem;
    padding: 0.7rem 0.4rem;
    border-radius: 14px;
    border: 2.5px solid transparent;
    cursor: pointer;
    transition: transform 0.1s, border-color 0.15s, box-shadow 0.15s;
    color: #1a1a2e;
    line-height: 1.2;
  }

  .diff-btn:active { transform: scale(0.96); }
  .diff-btn.easy  { background: var(--green);  }
  .diff-btn.med   { background: var(--yellow); }
  .diff-btn.hard  { background: var(--pink);   }

  .diff-btn.selected {
    border-color: white;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.2);
  }

  .diff-range {
    display: block;
    font-family: 'Nunito', sans-serif;
    font-size: 0.68rem;
    font-weight: 700;
    margin-top: 2px;
    opacity: 0.7;
  }

  .pb-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 1.5rem;
  }

  .pb-cell {
    background: var(--card2);
    border-radius: 14px;
    padding: 0.75rem 0.5rem;
    text-align: center;
    border: 1.5px solid rgba(255,255,255,0.08);
  }

  .pb-cell-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 5px;
  }

  .pb-cell-val {
    font-family: 'Fredoka One', cursive;
    font-size: 1.15rem;
  }

  .c-easy { color: var(--green);  }
  .c-med  { color: var(--yellow); }
  .c-hard { color: var(--pink);   }
  .c-none { color: var(--muted); font-size: 0.85rem; font-style: italic; font-family: 'Nunito', sans-serif; }

  .btn {
    display: block; width: 100%;
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    padding: 1rem;
    border: none; border-radius: 16px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    letter-spacing: 0.03em;
  }

  .btn:active { transform: scale(0.97); }

  .btn-start {
    background: linear-gradient(135deg, var(--orange), var(--pink));
    color: white;
    box-shadow: 0 6px 24px rgba(255,107,53,0.4);
    margin-bottom: 0.75rem;
  }

  .btn-start:hover { box-shadow: 0 8px 30px rgba(255,107,53,0.6); }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    font-family: 'Nunito', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 0.55rem;
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
    letter-spacing: 0;
  }

  .btn-ghost:hover { color: var(--pink); border-color: var(--pink); }
  .btn-ghost.blue:hover { color: var(--blue); border-color: var(--blue); }

  /* ── QUIZ SCREEN ── */
  .quiz-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
  }

  .q-counter {
    color: var(--muted);
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .live-timer {
    font-family: 'Fredoka One', cursive;
    font-size: 1.5rem;
    min-width: 80px;
    text-align: right;
    color: var(--green);
    transition: color 0.4s;
  }

  .progress-bar-wrap {
    background: rgba(255,255,255,0.1);
    border-radius: 99px;
    height: 8px;
    margin-bottom: 1.5rem;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  .bar-easy { background: linear-gradient(90deg, #06D6A0, #4CC9F0); }
  .bar-med  { background: linear-gradient(90deg, #FFD93D, #FF6B35); }
  .bar-hard { background: linear-gradient(90deg, #FF70A6, #9B5DE5); }

  .mode-badge {
    display: block;
    text-align: center;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 700;
    margin-bottom: 0.4rem;
  }

  .question {
    font-family: 'Fredoka One', cursive;
    font-size: 3.5rem;
    text-align: center;
    margin-bottom: 1.8rem;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  .question span { color: var(--yellow); }

  .answer-input {
    display: block; width: 100%;
    background: var(--card2);
    border: 2.5px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    color: var(--text);
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    padding: 0.8rem 1rem;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }

  .answer-input::-webkit-inner-spin-button,
  .answer-input::-webkit-outer-spin-button { -webkit-appearance: none; }

  .answer-input:focus   { border-color: var(--blue);  }
  .answer-input.correct { border-color: var(--green); background: rgba(6,214,160,0.12);   }
  .answer-input.wrong   { border-color: var(--pink);  background: rgba(255,112,166,0.12); }

  .feedback {
    text-align: center;
    font-size: 1.1rem;
    font-weight: 700;
    min-height: 1.8rem;
    margin-top: 1rem;
  }

  .feedback.correct { color: var(--green); }
  .feedback.wrong   { color: var(--pink);  }

  .btn-submit {
    background: linear-gradient(135deg, var(--blue), var(--purple));
    color: white;
    box-shadow: 0 6px 24px rgba(76,201,240,0.3);
    margin-top: 1.5rem;
  }

  /* ── RESULT SCREEN ── */
  .result-icon  { font-size: 4rem; text-align: center; margin-bottom: 1rem; }

  .result-title {
    font-family: 'Fredoka One', cursive;
    font-size: 2.2rem;
    text-align: center;
    margin-bottom: 0.3rem;
  }

  .result-subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 1rem;
    margin-bottom: 1.5rem;
  }

  .time-box {
    background: var(--card2);
    border-radius: 20px;
    padding: 1.5rem;
    text-align: center;
    margin-bottom: 1rem;
    border: 1.5px solid rgba(255,255,255,0.1);
  }

  .time-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .time-value {
    font-family: 'Fredoka One', cursive;
    font-size: 3rem;
    color: var(--blue);
  }

  .new-best-badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--yellow), var(--orange));
    color: #1a1a2e;
    font-weight: 700;
    font-size: 0.85rem;
    padding: 4px 14px;
    border-radius: 99px;
    margin-top: 8px;
    letter-spacing: 0.05em;
  }

  .prev-best { color: var(--muted); font-size: 0.9rem; margin-top: 6px; }

  .btn-again {
    background: linear-gradient(135deg, var(--green), var(--blue));
    color: white;
    box-shadow: 0 6px 24px rgba(6,214,160,0.3);
    margin-bottom: 0.75rem;
  }

  /* confetti */
  .confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; overflow: hidden; }
  .confetti-piece { position: absolute; top: -20px; animation: fall linear forwards; border-radius: 2px; }

  @keyframes fall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>
<div class="stars"></div>
<div class="confetti" id="confetti"></div>

<div class="wrap">
  <div class="card">

    <!-- START SCREEN -->
    <div class="screen active" id="screen-start">
      <div class="big-title">Times Tables<br>Challenge!</div>
      <div class="subtitle">get 10 right · keep going till you do!</div>

      <div class="section-label">Choose difficulty</div>
      <div class="diff-btns">
        <button class="diff-btn easy selected" onclick="selectDiff('easy')">
          Easy <span class="diff-range">2, 5, 10</span>
        </button>
        <button class="diff-btn med" onclick="selectDiff('med')">
          Medium <span class="diff-range">3, 4, 6</span>
        </button>
        <button class="diff-btn hard" onclick="selectDiff('hard')">
          Hard <span class="diff-range">7, 8, 9</span>
        </button>
      </div>

      <div class="section-label" style="margin-bottom:0.5rem">Personal bests</div>
      <div class="pb-grid">
        <div class="pb-cell">
          <div class="pb-cell-label">Easy</div>
          <div class="pb-cell-val" id="pb-easy">—</div>
        </div>
        <div class="pb-cell">
          <div class="pb-cell-label">Medium</div>
          <div class="pb-cell-val" id="pb-med">—</div>
        </div>
        <div class="pb-cell">
          <div class="pb-cell-label">Hard</div>
          <div class="pb-cell-val" id="pb-hard">—</div>
        </div>
      </div>

      <button class="btn btn-start" onclick="startQuiz()">Let's Go!</button>
      <button class="btn btn-ghost" onclick="resetPBs()">Reset personal bests</button>
    </div>

    <!-- QUIZ SCREEN -->
    <div class="screen" id="screen-quiz">
      <div class="quiz-top">
        <div class="q-counter" id="q-counter">0 / 10 correct</div>
        <div class="live-timer" id="live-timer">0.0s</div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill bar-easy" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="mode-badge c-easy" id="mode-badge">Easy · 2, 5, 10</div>
      <div class="question" id="question-text">? × ?</div>
      <input
        class="answer-input"
        id="answer-input"
        type="number"
        inputmode="numeric"
        placeholder="?"
        autocomplete="off"
        onkeydown="handleKey(event)"
      />
      <div class="feedback" id="feedback"></div>
      <button class="btn btn-submit" onclick="submitAnswer()">Check ✓</button>
    </div>

    <!-- RESULT SCREEN -->
    <div class="screen" id="screen-result">
      <div class="result-icon">🏆</div>
      <div class="result-title">You did it!</div>
      <div class="result-subtitle" id="result-subtitle">All 10 correct!</div>
      <div id="result-time-section"></div>
      <button class="btn btn-again" onclick="startQuiz()">Play Again</button>
      <button class="btn btn-ghost blue" style="margin-top:0" onclick="goHome()">Change difficulty</button>
    </div>

  </div>
</div>

<script>
const TOTAL = 10;
const PB_KEYS = { easy: 'mq_pb_easy', med: 'mq_pb_med', hard: 'mq_pb_hard' };
const TABLES  = { easy: [2,5,10], med: [3,4,6], hard: [7,8,9] };
const LABELS  = { easy: 'Easy · 2, 5, 10', med: 'Medium · 3, 4, 6', hard: 'Hard · 7, 8, 9' };
const MODE_NAMES = { easy: 'Easy', med: 'Medium', hard: 'Hard' };

let mode = 'easy', correct = 0, startTime = 0, answering = true;
let currentQ = null, timerRAF = null;

function getPB(m) {
  const v = localStorage.getItem(PB_KEYS[m]);
  return v ? parseFloat(v) : null;
}

function savePB(m, t) { localStorage.setItem(PB_KEYS[m], t.toFixed(2)); }

function resetPBs() {
  if (!confirm('Reset all personal bests? This cannot be undone.')) return;
  Object.values(PB_KEYS).forEach(k => localStorage.removeItem(k));
  refreshPBGrid();
}

function fmt(s) {
  const m = Math.floor(s / 60);
  const sec = (s % 60).toFixed(1);
  return m > 0 ? `${m}m ${sec}s` : `${sec}s`;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  stopTimer();
  showScreen('screen-start');
  refreshPBGrid();
}

function selectDiff(m) {
  mode = m;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
  document.querySelector(`.diff-btn.${m}`).classList.add('selected');
}

function refreshPBGrid() {
  ['easy', 'med', 'hard'].forEach(m => {
    const pb = getPB(m);
    const el = document.getElementById(`pb-${m}`);
    if (pb) {
      el.className = `pb-cell-val c-${m}`;
      el.textContent = fmt(pb);
    } else {
      el.className = 'pb-cell-val c-none';
      el.textContent = '—';
    }
  });
}

function startTimer() {
  const el = document.getElementById('live-timer');
  function tick() {
    const elapsed = (performance.now() - startTime) / 1000;
    el.textContent = fmt(elapsed);
    if      (elapsed < 30) el.style.color = 'var(--green)';
    else if (elapsed < 60) el.style.color = 'var(--yellow)';
    else                   el.style.color = 'var(--pink)';
    timerRAF = requestAnimationFrame(tick);
  }
  timerRAF = requestAnimationFrame(tick);
}

function stopTimer() {
  if (timerRAF) { cancelAnimationFrame(timerRAF); timerRAF = null; }
}

function startQuiz() {
  correct = 0;
  answering = true;

  document.getElementById('progress-fill').className = `progress-bar-fill bar-${mode}`;
  const badge = document.getElementById('mode-badge');
  badge.className = `mode-badge c-${mode}`;
  badge.textContent = LABELS[mode];

  showScreen('screen-quiz');
  stopTimer();
  startTime = performance.now();
  startTimer();
  showQuestion();
}

function randomQ() {
  const tables = TABLES[mode];
  const a = tables[Math.floor(Math.random() * tables.length)];
  const b = Math.floor(Math.random() * 9) + 1;
  return [a, b];
}

function showQuestion() {
  currentQ = randomQ();
  const [a, b] = currentQ;
  document.getElementById('q-counter').textContent = `${correct} / ${TOTAL} correct`;
  document.getElementById('progress-fill').style.width = `${(correct / TOTAL) * 100}%`;
  document.getElementById('question-text').innerHTML = `<span>${a}</span> × <span>${b}</span>`;
  const inp = document.getElementById('answer-input');
  inp.value = '';
  inp.className = 'answer-input';
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  answering = true;
  setTimeout(() => inp.focus(), 50);
}

function handleKey(e) { if (e.key === 'Enter') submitAnswer(); }

function submitAnswer() {
  if (!answering) return;
  const inp = document.getElementById('answer-input');
  const val = inp.value.trim();
  if (val === '' || isNaN(val)) return;

  const [a, b] = currentQ;
  const userAns = parseInt(val);
  const rightAns = a * b;
  const fb = document.getElementById('feedback');

  answering = false;

  if (userAns === rightAns) {
    inp.classList.add('correct');
    fb.textContent = '✓ Correct!';
    fb.className = 'feedback correct';
    correct++;
    if (correct === TOTAL) {
      setTimeout(() => showResult(), 700);
    } else {
      setTimeout(() => showQuestion(), 700);
    }
  } else {
    inp.classList.add('wrong');
    fb.textContent = `✗ It's ${rightAns} — try again!`;
    fb.className = 'feedback wrong';
    setTimeout(() => showQuestion(), 900);
  }
}

function showResult() {
  stopTimer();
  const elapsed = (performance.now() - startTime) / 1000;

  document.getElementById('result-subtitle').textContent = `${MODE_NAMES[mode]} mode · all 10 correct!`;

  const pb = getPB(mode);
  const isNew = pb === null || elapsed < pb;
  if (isNew) savePB(mode, elapsed);

  const badgeHTML = isNew
    ? `<div class="new-best-badge">${pb === null ? '⭐ First record!' : '🏆 New personal best!'}</div>`
    : `<div class="prev-best">Personal best: ${fmt(pb)} &nbsp;(+${fmt(elapsed - pb)})</div>`;

  document.getElementById('result-time-section').innerHTML = `
    <div class="time-box">
      <div class="time-label">Your time · ${MODE_NAMES[mode]}</div>
      <div class="time-value">${fmt(elapsed)}</div>
      ${badgeHTML}
    </div>
  `;

  showScreen('screen-result');
  refreshPBGrid();
  launchConfetti();
}

function launchConfetti() {
  const container = document.getElementById('confetti');
  container.innerHTML = '';
  const colors = ['#FFD93D','#FF6B35','#FF70A6','#4CC9F0','#06D6A0','#9B5DE5'];
  for (let i = 0; i < 80; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.width  = (Math.random() * 8 + 6) + 'px';
    p.style.height = (Math.random() * 8 + 6) + 'px';
    p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    p.style.animationDuration = (Math.random() * 2 + 2) + 's';
    p.style.animationDelay   = (Math.random() * 1.5) + 's';
    container.appendChild(p);
  }
  setTimeout(() => container.innerHTML = '', 5000);
}

refreshPBGrid();
</script>
</body>
</html>
